<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rob Streeten</title>

<style>
:root {
    --bg: #f4f4f4;
    --card: #ffffff;
    --text: #111111;
    --border: #e5e5e5;
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
}

.container {
    max-width: 600px;
    margin: 0 auto;
    padding: 0;
}

.banner {
    width: 100%;
    display: block;
}

.header {
    text-align: center;
    padding: 24px 20px 10px;
}

.header h1 {
    margin: 0;
    font-size: 34px;
}

.header p {
    margin: 8px 0 0;
    color: #666;
    font-size: 18px;
}

.tiles {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    padding: 20px;
}

.tile {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    text-decoration: none;
    color: var(--text);
    padding: 20px;
    min-height: 150px;

    display: flex;
    flex-direction: column;
    justify-content: space-between;

    box-shadow: 0 6px 16px rgba(0,0,0,0.08);
}

.tile:hover {
    transform: translateY(-2px);
}

.icon {
    font-size: 32px;
}

.label {
    font-size: 20px;
    font-weight: 600;
    line-height: 1.2;
}

.footer {
    text-align: center;
    color: #777;
    padding: 10px 20px 30px;
}

.linkedin-logo {
    width: 36px;
    height: 36px;
}

@media (max-width: 500px) {

    .tiles {
        grid-template-columns: 1fr;
    }

    .tile {
        min-height: 120px;
    }
}
</style>

</head>

<body>

<div class="container">

    <img src="coolabi.jpeg" alt="Coolabi" class="banner">

    <div class="header">
        <h1>Rob Streeten</h1>
        <p>Group Finance Director</p>
    </div>

    <div class="tiles">

        <a class="tile"
           href="https://www.linkedin.com/in/rob-streeten/"
           target="_blank">

            <img
                class="linkedin-logo"
                src="https://upload.wikimedia.org/wikipedia/commons/c/ca/LinkedIn_logo_initials.png"
                alt="LinkedIn">

            <div class="label">
                Connect on LinkedIn
            </div>

        </a>

        <a class="tile"
           href="rob-streeten.vcf">

            <div class="icon">👤</div>

            <div class="label">
                Add Rob to Contacts
            </div>

        </a>

        <a class="tile"
           href="https://calendly.com/">

            <div class="icon">📅</div>

            <div class="label">
                Plan a Meeting
            </div>

        </a>

        <a class="tile"
           href="https://www.coolabi.com"
           target="_blank">

            <div class="icon">🚀</div>

            <div class="label">
                Visit Coolabi
            </div>

        </a>

    </div>

    <div class="footer">
        Tap a tile to continue
    </div>

</div>

</body>
</html>
