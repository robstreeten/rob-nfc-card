<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rob Streeten</title>

<style>

:root {
    --bg: #f4f4f4;
    --card: #ffffff;
    --text: #111111;
    --border: #e5e5e5;
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
}

.container {
    max-width: 500px;
    margin: 0 auto;
}

.banner {
    width: 100%;
    display: block;
}

.header {
    text-align: center;
    padding: 18px 16px 8px;
}

.header h1 {
    margin: 0;
    font-size: 30px;
    line-height: 1.1;
}

.header p {
    margin: 6px 0 0;
    color: #666;
    font-size: 16px;
}

.tiles {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 14px;
}

.tile {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    text-decoration: none;
    color: var(--text);

    aspect-ratio: 1 / 1;

    padding: 16px;

    display: flex;
    flex-direction: column;
    justify-content: space-between;

    box-shadow: 0 6px 16px rgba(0,0,0,0.08);

    transition: transform 0.15s ease;
}

.tile:active {
    transform: scale(0.98);
}

.icon {
    font-size: 34px;
}

.label {
    font-size: 18px;
    font-weight: 600;
    line-height: 1.2;
}

.linkedin-logo {
    width: 38px;
    height: 38px;
}

.footer {
    text-align: center;
    color: #777;
    padding: 0 20px 20px;
    font-size: 14px;
}

</style>

</head>

<body>

<div class="container">

    <img src="coolabi.jpeg" alt="Coolabi" class="banner">

    <div class="header">
        <h1>Rob Streeten</h1>
        <p>Group Finance Director</p>
    </div>

    <div class="tiles">

        <a class="tile"
           href="https://www.linkedin.com/in/rob-streeten/"
           target="_blank">

            <img
                class="linkedin-logo"
                src="https://upload.wikimedia.org/wikipedia/commons/c/ca/LinkedIn_logo_initials.png"
                alt="LinkedIn">

            <div class="label">
                Connect on LinkedIn
            </div>

        </a>

        <a class="tile"
           href="rob-streeten.vcf">

            <div class="icon">👤</div>

            <div class="label">
                Add Rob to Contacts
            </div>

        </a>

        <a class="tile"
           href="https://outlook.office.com/bookwithme/user/c600a0ba5ab44b83baed6254a4d6d3dc@coolabi.com/meetingtype/hTFlTVwI50CL1eIs5mQDWg2?anonymous&ep=owaSlotsCopyLink">

            <div class="icon">📅</div>

            <div class="label">
                Plan a Meeting
            </div>

        </a>

        <a class="tile"
           href="https://www.coolabi.com"
           target="_blank">

            <div class="icon">🚀</div>

            <div class="label">
                Visit Coolabi
            </div>

        </a>

    </div>

    <div class="footer">
        Tap a tile to continue
    </div>

</div>

</body>
</html>
